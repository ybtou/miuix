name: Build All Tests

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "CLAUDE.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: "iosSimulatorArm64Test"
            os: macos-latest
          - target: "desktopTest"
            os: ubuntu-latest
          - target: "assembleAndroidTest"
            os: ubuntu-latest
          - target: "wasmJsBrowserTest"
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Sources
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run check
        if: matrix.os == 'macos-latest'
        run: ./gradlew check
      - name: Run test
        run: ./gradlew ${{ matrix.target }}
      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            **/build/reports/**
